name: Write Ahead Log
description: A Write-Ahead Log (WAL) is a standard technique in database systems where
  changes are first recorded to a sequential log file before being applied to the
  actual data files. It ensures durability and crash recovery by guaranteeing that
  committed transactions can be reconstructed from the log even if the system fails
  during a write operation.
